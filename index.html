<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>
<style>
body{
margin:0;height:100vh;display:flex;justify-content:center;align-items:center;
font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffe6f0,#fff5f5);overflow:hidden;
}
.container{text-align:center;}
.cat{font-size:120px;}
input{padding:12px;width:250px;border-radius:10px;border:1px solid #ccc;text-align:center;}
h1{margin:20px 0;}
.no-btn{
position:absolute;padding:15px 40px;font-size:22px;border:none;border-radius:12px;
background:#ff4d4d;color:white;cursor:pointer;
}
.yes-btn{
position:absolute;top:10px;right:10px;width:18px;height:18px;
border:none;border-radius:50%;background:#4CAF50;color:transparent;opacity:.15;cursor:pointer;
}
</style>
</head>
<body>

<button class="yes-btn" onclick="sayYes()">YES</button>

<div class="container">
<div class="cat">🐱❓</div>
<input type="text" id="name" placeholder="Enter your name">
<h1>DO YOU LOVE ME?</h1>
<button id="noBtn" class="no-btn">NO 😒</button>
</div>

<script>
let moveCount = 0;
const noBtn = document.getElementById("noBtn");

noBtn.style.left = "42%";
noBtn.style.top = "70%";

function moveButton(){
    if(moveCount >= 10){
        showSecondPage();
        return;
    }

    moveCount++;

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.left = (Math.random()*maxX) + "px";
    noBtn.style.top = (Math.random()*maxY) + "px";

    if(moveCount === 10){
        setTimeout(() => {
            alert("Finally! You tried 10 times 😏");
            showSecondPage();
        }, 500);
    }
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function showSecondPage(){
document.body.innerHTML = `
<div style="height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px;">
<div>
<div style="font-size:100px;">😡</div>
<h1>You can't put efforts for finding YES, but for me?</h1>
</div>
</div>`;
}

function sayYes(){
let person = document.getElementById("name").value.trim();
if(person===""){person="Someone";}

document.body.innerHTML = `
<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h1>❤️🥰❤️</h1>
<h2>${person} loves me ❤️</h2>
<div style="font-size:120px;">🐱💕</div>
</div>`;
}
</script>

</body>
</html>
